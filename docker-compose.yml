services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tracking
      POSTGRES_USER: tracking
      POSTGRES_PASSWORD: ${DB_PASSWORD:-trackingpass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracking"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://tracking:${DB_PASSWORD:-trackingpass}@db:5432/tracking
      DATABASE_URL_SYNC: postgresql://tracking:${DB_PASSWORD:-trackingpass}@db:5432/tracking
      UNIFI_HOST: ${UNIFI_HOST:-192.168.1.1}
      UNIFI_USERNAME: ${UNIFI_USERNAME:-admin}
      UNIFI_PASSWORD: ${UNIFI_PASSWORD:-}
      UNIFI_SITE: ${UNIFI_SITE:-default}
      UNIFI_VERIFY_SSL: ${UNIFI_VERIFY_SSL:-false}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-30}
      SYSLOG_PORT: ${SYSLOG_PORT:-5514}
    ports:
      - "8000:8000"
      - "5514:5514/udp"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
